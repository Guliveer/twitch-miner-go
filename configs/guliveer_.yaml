max_watch_streams: 10
priority:
  - DROPS
  - ORDER
  - STREAK
features:
  claim_drops_startup: true
category_watcher:
  enabled: true
  poll_interval: 180s
  drops_only: true
  categories:
    - slug: tom-clancys-rainbow-six-siege
      drops_only: false
    - slug: battlefield-6
      drops_only: false
    - slug: valorant
    - slug: star-citizen
    - slug: the-finals
    - slug: arc-raiders
    - slug: destiny-2
    - slug: call-of-duty-warzone
    - slug: trove
    - slug: delta-force-hawk-ops
    - slug: pubg-battlegrounds
    - slug: war-thunder
    - slug: minecraft
    - slug: rocket-league
team_watcher:
  enabled: true
  poll_interval: 180s
  teams:
    - name: rainbow6
streamer_defaults:
  make_predictions: true
  follow_raid: true
  claim_drops: true
  claim_moments: true
  watch_streak: true
  chat: ONLINE
  bet:
    strategy: SMART
    percentage: 5
    percentage_gap: 20
    max_points: 50000
    minimum_points: 20000
    stealth_mode: true
    delay: 6
    delay_mode: FROM_END
