name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commit-lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|chore|ci|build)(\([a-zA-Z0-9_-]+\))?(!)?: .+'

          echo "PR title: $PR_TITLE"
          if ! echo "$PR_TITLE" | grep -qE "$PATTERN"; then
            echo ""
            echo "🚫 PR title does not follow Conventional Commits format."
            echo "This matters because squash-merge uses the PR title as the commit message."
            echo ""
            echo "Format: <type>[optional scope][!]: <description>"
            echo "Types: feat, fix, docs, style, refactor, perf, test, chore, ci, build"
            echo "Examples:"
            echo "  feat: add Docker Compose support"
            echo "  fix(gql): retry on transient failures"
            echo "  feat!: require Twitch runtime identifiers"
            exit 1
          fi

          echo "✅ PR title follows Conventional Commits format."

      - name: Validate Conventional Commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|chore|ci|build)(\([a-zA-Z0-9_-]+\))?(!)?: .+'

          errors=0
          while IFS= read -r line; do
            sha="${line%% *}"
            msg="${line#* }"

            # Skip merge commits
            if echo "$msg" | grep -qE '^Merge '; then
              continue
            fi

            if ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "❌ ${sha:0:7}: $msg"
              errors=$((errors + 1))
            else
              echo "✅ ${sha:0:7}: $msg"
            fi
          done <<< "$(git log "${BASE_SHA}..${HEAD_SHA}" --format='%H %s')"

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "🚫 $errors commit(s) don't follow Conventional Commits format."
            echo "Format: <type>[optional scope][!]: <description>"
            echo "Types: feat, fix, docs, style, refactor, perf, test, chore, ci, build"
            exit 1
          fi

          echo ""
          echo "✅ All commits follow Conventional Commits format."

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: |
          VERSION=$(cat VERSION)
          GIT_COMMIT=$(git rev-parse --short HEAD)
          go build -v -ldflags "-X github.com/Guliveer/twitch-miner-go/internal/version.Number=${VERSION} -X github.com/Guliveer/twitch-miner-go/internal/version.GitCommit=${GIT_COMMIT}" ./...

      - name: Test
        run: go test -v ./...

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  version:
    needs: [build]
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !startsWith(github.event.head_commit.message, 'chore:')
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      bumped: ${{ steps.bump.outputs.bump }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump
        id: bump
        run: |
          # Find the last version tag
          LAST_TAG=$(git tag -l 'v*.*.*' --sort=-v:refname | head -n1)

          if [ -z "$LAST_TAG" ]; then
            echo "No previous version tag found. Using first commit as base."
            RANGE="HEAD"
            COMMITS=$(git log --first-parent --format="%s" "$RANGE")
          else
            echo "Last tag: $LAST_TAG"
            RANGE="${LAST_TAG}..HEAD"
            # --first-parent: only analyze commits directly on main,
            # not internal commits from merged branches/forks.
            # This prevents external PR commit history from influencing version bumps.
            COMMITS=$(git log --first-parent --format="%s" "$RANGE")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No new commits since last tag."
            echo "bump=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Commits since last tag:"
          echo "$COMMITS"
          echo ""

          BUMP="skip"

          while IFS= read -r msg; do
            [ -z "$msg" ] && continue

            # Check for breaking changes
            if echo "$msg" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|chore|ci|build)(\([a-zA-Z0-9_-]+\))?!: '; then
              BUMP="major"
              break
            fi
            if echo "$msg" | grep -qiE 'BREAKING CHANGE:'; then
              BUMP="major"
              break
            fi

            # Check for features
            if echo "$msg" | grep -qE '^feat(\([a-zA-Z0-9_-]+\))?: '; then
              if [ "$BUMP" != "major" ]; then
                BUMP="minor"
              fi
              continue
            fi

            # Check for patch-level types
            if echo "$msg" | grep -qE '^(fix|perf|refactor|build)(\([a-zA-Z0-9_-]+\))?: '; then
              if [ "$BUMP" = "skip" ]; then
                BUMP="patch"
              fi
              continue
            fi

            # Check for no-bump types (docs, style, test, ci, chore)
            if echo "$msg" | grep -qE '^(docs|style|test|ci|chore)(\([a-zA-Z0-9_-]+\))?: '; then
              continue
            fi

            # Non-conventional commit — skip
            continue
          done <<< "$COMMITS"

          echo "Determined bump type: $BUMP"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Bump version
        if: steps.bump.outputs.bump != 'skip'
        id: version
        run: |
          # Derive current version from the latest git tag (immutable, fork-safe).
          # Falls back to VERSION file only if no tags exist yet.
          LAST_TAG=$(git tag -l 'v*.*.*' --sort=-v:refname | head -n1)
          if [ -n "$LAST_TAG" ]; then
            CURRENT="${LAST_TAG#v}"
          else
            CURRENT=$(cat VERSION)
          fi
          echo "Current version: $CURRENT (source: ${LAST_TAG:-VERSION file})"

          BUMP="${{ steps.bump.outputs.bump }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"

          printf "%s" "$NEW_VERSION" > VERSION

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        if: steps.bump.outputs.bump != 'skip'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          git add VERSION
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
          git tag -a "v${NEW_VERSION}" -m "v${NEW_VERSION}"
          git push origin main --follow-tags

      - name: Create GitHub Release
        if: steps.bump.outputs.bump != 'skip'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.new_version }}"
          generate_release_notes: true

  deploy:
    needs: [build, version]
    runs-on: ubuntu-latest
    environment:
      name: fly.io [prod]
      url: https://twitch-miner-go.fly.dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          VERSION: ${{ needs.version.outputs.new_version }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "⚠️ FLY_API_TOKEN not set — skipping deploy"
            exit 0
          fi
          GIT_COMMIT=$(git rev-parse --short HEAD)
          flyctl deploy --remote-only \
            --build-arg "VERSION=${VERSION}" \
            --build-arg "GIT_COMMIT=${GIT_COMMIT}"
